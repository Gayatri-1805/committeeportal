<div class="register-container">
  <div class="register-card">
    <h2>Register</h2>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm">
      <div class="form-group">
        <label for="role">Role:</label>
        <select
          id="role"
          name="role"
          [(ngModel)]="role"
          required
        >
          <option value="COMMITTEE">Committee</option>
          <option value="APPROVER">Approver</option>
        </select>
      </div>

      <!-- Committee-specific fields -->
      <div *ngIf="role === 'COMMITTEE'">
        <div class="form-group">
          <label for="committeeName">Committee Name:</label>
          <input
            type="text"
            id="committeeName"
            name="committeeName"
            [(ngModel)]="committeeName"
            placeholder="Enter committee name"
            required
          />
        </div>

        <div class="form-group">
          <label for="facultyInChargeName">Faculty In Charge Name:</label>
          <input
            type="text"
            id="facultyInChargeName"
            name="facultyInChargeName"
            [(ngModel)]="facultyInChargeName"
            placeholder="Enter faculty in charge name"
            required
          />
        </div>
      </div>

      <!-- Approver-specific fields -->
      <div *ngIf="role === 'APPROVER'">
        <div class="form-group">
          <label for="name">Name:</label>
          <input
            type="text"
            id="name"
            name="name"
            [(ngModel)]="name"
            placeholder="Enter your name"
            required
          />
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email:</label>
        <input
          type="email"
          id="email"
          name="email"
          [(ngModel)]="email"
          placeholder="Enter your email"
          required
        />
      </div>

      <div class="form-group">
        <label for="password">Password:</label>
        <input
          type="password"
          id="password"
          name="password"
          [(ngModel)]="password"
          placeholder="Enter your password"
          required
        />
      </div>

      <div *ngIf="errorMessage" class="error-message">
        {{ errorMessage }}
      </div>

      <button type="submit" [disabled]="isLoading" class="btn-submit">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>
    </form>

    <div class="login-link">
      <p>Already have an account? <a (click)="navigateToLogin()">Login here</a></p>
    </div>
  </div>
</div>
