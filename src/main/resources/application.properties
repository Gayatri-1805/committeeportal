spring.datasource.url=jdbc:postgresql://ep-empty-truth-amahqou9-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
spring.datasource.username=team_user
spring.datasource.password=TeamPassword@2026
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# Jackson Configuration
# Prevent failures on empty beans
spring.jackson.serialization.fail-on-empty-beans=false
# Handle date serialization properly
spring.jackson.serialization.write-dates-as-timestamps=false
# Ensure proper date/time handling
spring.jackson.date-format=yyyy-MM-dd
    
# Springdoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging settings
logging.level.root=INFO
logging.level.com.example.committeeportal=DEBUG
logging.file.name=logs/committeeportal.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

spring.datasource.hikari.max-lifetime=240000      
spring.datasource.hikari.keepalive-time=60000     
spring.datasource.hikari.idle-timeout=120000      
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.validation-timeout=5000