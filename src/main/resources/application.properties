spring.datasource.url=jdbc:postgresql://ep-empty-truth-amahqou9-pooler.c-5.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require&currentSchema=public
spring.datasource.username=neondb_owner
spring.datasource.password=npg_lyH9G7uIqBnv
spring.datasource.driver-class-name=org.postgresql.Driver

# HikariCP Connection Pool Configuration (Optimized for Neon)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.connection-test-query=SELECT 1

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Jackson Configuration
# Prevent failures on empty beans
spring.jackson.serialization.fail-on-empty-beans=false
# Handle date serialization properly
spring.jackson.serialization.write-dates-as-timestamps=false
# Ensure proper date/time handling
spring.jackson.date-format=yyyy-MM-dd

# JWT Configuration
jwt.secret=CommittePortalSecretKey123456789012345678901234567890ANYDATASKEY
jwt.expiration=86400000

# Springdoc / Swagger UI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# Logging settings
logging.level.root=INFO
logging.level.com.example.committeeportal=DEBUG
logging.file.name=logs/committeeportal.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n